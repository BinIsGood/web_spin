<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>汉字妙笔 - 模拟图片风格</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/hanzi-writer@3.5/dist/hanzi-writer.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@700&family=Noto+Sans+SC:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --theme-bg: #fdf6e3;
            --theme-accent: #f39c12;
            --grid-color: #d63031;
        }
        body {
            font-family: 'Noto Sans SC', sans-serif;
            background-color: var(--theme-bg);
            color: #5d4037;
        }
        .serif-font {
            font-family: 'Noto Serif SC', serif;
        }
        #target-grid {
            background-color: white;
            border: 5px solid var(--grid-color);
            border-radius: 4px;
            box-shadow: 0 10px 25px rgba(214, 48, 49, 0.15);
            cursor: pointer;
        }
        .grid-line {
            stroke: var(--grid-color);
            stroke-width: 1;
            stroke-dasharray: 4, 4;
            opacity: 0.4;
        }
        .btn-action {
            @apply flex items-center justify-center gap-1 px-4 py-2 bg-white border border-gray-200 rounded-lg shadow-sm hover:bg-gray-50 transition-all text-sm font-medium;
        }
    </style>
</head>
<body class="min-h-screen flex flex-col items-center pt-8 px-4">

    <!-- 顶部说明文字 -->
    <p class="text-gray-500 text-sm mb-6 tracking-widest">输入汉字，查看笔顺，跟读发音，模拟描红</p>

    <div class="max-w-md w-full flex flex-col items-center space-y-8">
        
        <!-- 搜索栏 -->
        <div class="w-full flex gap-0 shadow-sm rounded-2xl overflow-hidden border border-orange-200">
            <input type="text" id="char-input" maxlength="1" placeholder="输入汉字" 
                class="flex-1 px-6 py-4 bg-white outline-none text-xl text-center font-bold">
            <button onclick="updateCharacter()" 
                class="bg-[#f39c12] hover:bg-[#e67e22] text-white px-8 py-4 font-bold transition-colors">
                学习
            </button>
        </div>

        <!-- 结果展示区 -->
        <div id="result-area" class="hidden flex flex-col items-center space-y-6 w-full animate-fade-in">
            
            <!-- 拼音展示 -->
            <div id="pinyin-display" class="text-4xl font-bold text-[#a67c52] serif-font tracking-tighter"></div>

            <!-- 米字格容器 -->
            <div class="relative p-2 bg-white rounded-lg">
                <div id="target-grid"></div>
            </div>

            <!-- 功能按钮区 (参考图片布局) -->
            <div class="flex flex-wrap justify-center gap-3 w-full">
                <button onclick="writer.animateCharacter()" class="btn-action">
                    <span class="text-blue-500">
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" viewBox="0 0 20 20" fill="currentColor">
                            <path fill-rule="evenodd" d="M10 18a8 8 0 100-16 8 8 0 000 16zM9.555 7.168A1 1 0 008 8v4a1 1 0 001.555.832l3-2a1 1 0 000-1.664l-3-2z" clip-rule="evenodd" />
                        </svg>
                    </span>
                    播放笔顺
                </button>
                <button onclick="startQuiz()" class="btn-action">
                    <span class="text-green-500">
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" viewBox="0 0 20 20" fill="currentColor">
                            <path d="M13.586 3.586a2 2 0 112.828 2.828l-.793.793-2.828-2.828.793-.793zM11.379 5.793L3 14.172V17h2.828l8.38-8.379-2.83-2.828z" />
                        </svg>
                    </span>
                    描红测验
                </button>
                <button onclick="speak()" class="btn-action">
                    <span class="text-orange-500">
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" viewBox="0 0 20 20" fill="currentColor">
                            <path fill-rule="evenodd" d="M9.383 3.076A1 1 0 0110 4v12a1 1 0 01-1.707.707L4.586 13H3a1 1 0 01-1-1V8a1 1 0 011-1h1.586l3.707-3.707a1 1 0 011.09-.217zM14.657 2.929a1 1 0 011.414 0A9.972 9.972 0 0119 10a9.972 9.972 0 01-2.929 7.071 1 1 0 01-1.414-1.414A7.971 7.971 0 0017 10c0-2.21-.894-4.208-2.343-5.657a1 1 0 010-1.414zm-2.829 2.828a1 1 0 011.415 0A5.983 5.983 0 0115 10a5.983 5.983 0 01-1.414 4.243 1 1 0 11-1.415-1.415A3.987 3.987 0 0013 10a3.987 3.987 0 00-1.414-2.828 1 1 0 010-1.415z" clip-rule="evenodd" />
                        </svg>
                    </span>
                    读音
                </button>
            </div>
        </div>
    </div>

    <script>
        let writer;
        let currentChar = '';

        function initWriter(char) {
            currentChar = char;
            document.getElementById('result-area').classList.remove('hidden');
            document.getElementById('target-grid').innerHTML = '';

            // 创建实例，颜色微调以匹配图片中的红色调
            writer = HanziWriter.create('target-grid', char, {
                width: 300,
                height: 300,
                padding: 20,
                strokeAnimationSpeed: 1,
                delayBetweenStrokes: 300,
                strokeColor: '#d63031', // 鲜红笔画
                outlineColor: '#f1f2f6',
                drawingColor: '#2ecc71',
                onExternalDataLoaded: (data) => {
                    drawMiZiGe();
                }
            });

            writer.animateCharacter();
            fetchPinyin(char);
            setTimeout(speak, 500);
        }

        // 绘制米字格
        function drawMiZiGe() {
            const svg = document.querySelector('#target-grid svg');
            if (!svg) return;
            const size = 300;
            const ns = "http://www.w3.org/2000/svg";
            
            const lines = [
                {x1: 0, y1: size/2, x2: size, y2: size/2}, // 横
                {x1: size/2, y1: 0, x2: size/2, y2: size}, // 纵
                {x1: 0, y1: 0, x2: size, y2: size},       // 斜1
                {x1: size, y1: 0, x2: 0, y2: size}        // 斜2
            ];

            lines.forEach(l => {
                const line = document.createElementNS(ns, 'line');
                line.setAttribute('x1', l.x1);
                line.setAttribute('y1', l.y1);
                line.setAttribute('x2', l.x2);
                line.setAttribute('y2', l.y2);
                line.classList.add('grid-line');
                svg.insertBefore(line, svg.firstChild);
            });
        }

        function updateCharacter() {
            const input = document.getElementById('char-input');
            const val = input.value.trim();
            if (val && /^[\u4e00-\u9fa5]$/.test(val)) {
                initWriter(val);
            }
        }

        async function fetchPinyin(char) {
            const pinyinEl = document.getElementById('pinyin-display');
            pinyinEl.innerText = "...";
            try {
                const response = await fetch(`https://api.pinyin.rocks/pinyin?text=${encodeURIComponent(char)}`);
                const data = await response.json();
                pinyinEl.innerText = data.pinyin || "";
            } catch (e) {
                pinyinEl.innerText = ""; 
            }
        }

        function speak() {
            if (!currentChar) return;
            window.speechSynthesis.cancel();
            const msg = new SpeechSynthesisUtterance(currentChar);
            msg.lang = 'zh-CN';
            msg.rate = 0.7;
            window.speechSynthesis.speak(msg);
        }

        function startQuiz() {
            if (writer) writer.quiz();
        }

        document.getElementById('char-input').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') updateCharacter();
        });
    </script>
</body>
</html>
