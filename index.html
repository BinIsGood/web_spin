<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Vegas Fox</title>

  <link rel="icon" href="icon_192.b0ed3.png" sizes="192x192" type="image/png" />
  <!-- <link rel="shortcut icon" href="favicon.ico" type="image/x-icon" /> -->

  <!-- <link rel="apple-touch-icon" href="favicon.ico" /> -->
 <link rel="apple-touch-icon" href="icon_192.b0ed3.png" sizes="192x192" type="image/png" />

  <meta name="viewport"
        content="width=device-width,user-scalable=no,initial-scale=1,minimum-scale=1,maximum-scale=1,minimal-ui=true"/>

  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="format-detection" content="telephone=no">
  <meta name="apple-mobile-web-app-title" content="Vegas Fox">

  <!-- force webkit on 360 -->
  <meta name="renderer" content="webkit"/>
  <meta name="force-rendering" content="webkit"/>
  <!-- force edge on IE -->
  <meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1"/>
  <meta name="msapplication-tap-highlight" content="no">

  <!-- force full screen on some browser -->
  <meta name="full-screen" content="yes"/>
  <meta name="x5-fullscreen" content="true"/>
  <meta name="360-fullscreen" content="true"/>

  <!--fix fireball/issues/3568 -->
  <!--<meta name="browsermode" content="application">-->
  <meta name="x5-page-mode" content="app">
  <meta http-equiv="Permissions-Policy" content="screen-wake-lock=(self), clipboard-read=(self), clipboard-write=(self)">


  <style>
    html, body {
      margin: 0; padding: 0; width: 100%; height: 100%;
      position: fixed; overflow: hidden;
      -webkit-overflow-scrolling: touch;
      user-select: none; -webkit-user-select: none;
      background-color: #000A1B; /* 防止加载前白屏 */
    }
    #GameDiv { width: 100%; height: 100%; }

    /* ========= loading style ========== */
    #loading-mask {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background-color: #000A1B; /* 与游戏背景色一致 */
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      z-index: 9999; /* 确保在最上层 */
    }



/* 3. 文本优化：金色霓虹风 (Vegas Fox 主题) */
    .loading-text {
        font-family: Helvetica, Arial, sans-serif;
        font-size: 24px; /* 加大字号 */
        font-weight: 700;
        letter-spacing: 3px;
        text-transform: uppercase;
        color: #fff; /* 基色为白 */
        margin-bottom: 30px;
        
        /* 霓虹光晕效果 */
        text-shadow:
            0 0 5px #fff,
            0 0 10px #ff00ff, /* 紫红霓虹芯 */
            0 0 15px #ff00ff,
            0 0 20px #ff00ff,
            0 0 30px #ffd700, /* 最外层金色霓虹光暈 */
            0 0 40px #ffd700;
            
        /* 加一个呼吸闪烁动画，避免玩家认为卡死 */
        animation: pulseNeon 1.8s infinite;
    }

    /* 4. Loading 圈优化：霓虹渐变 + 光晕 */
    .loading-spinner {
        width: 60px; /* 加大尺寸 */
        height: 60px;
        border-radius: 50%;
        position: relative;
        background: radial-gradient(circle, rgba(255, 255, 255, 0) 60%, rgba(255, 0, 255, 0.4) 62%);
        
        /* 增加一个内部的霓虹光晕 */
        box-shadow: 0 0 15px #ff00ff, inset 0 0 5px #ff00ff;
        
        animation: spin 0.8s linear infinite;
    }
    
    .loading-spinner::after {
        content: '';
        position: absolute;
        top: -4px; left: -4px; right: -4px; bottom: -4px;
        border-radius: 50%;
        border: 4px solid transparent;
        border-top-color: #ffd700; /* 金色霓虹芯 */
        box-shadow: 0 0 10px #ffd700;
    }

    /* 5. 动画定义 */
    @keyframes spin { 
        to { transform: rotate(360deg); } 
    }
    
    @keyframes pulseNeon {
        0% { opacity: 0.6; text-shadow: 0 0 5px #fff, 0 0 10px #ff00ff, 0 0 20px #ff00ff, 0 0 30px #ffd700; }
        50% { opacity: 1; text-shadow: 0 0 7px #fff, 0 0 15px #ff00ff, 0 0 30px #ff00ff, 0 0 50px #ffd700; }
        100% { opacity: 0.6; text-shadow: 0 0 5px #fff, 0 0 10px #ff00ff, 0 0 20px #ff00ff, 0 0 30px #ffd700; }
    }



  </style>

  <link rel="stylesheet" type="text/css" href="style.f76d1.css"/>

</head>
<body>
  <div id="loading-mask">
    <div class="loading-text">Loading...</div>
    <div class="loading-spinner"></div>
  </div>

  <div id="GameDiv" cc_exact_fit_screen="true">
      <div id="Cocos3dGameContainer">
        <canvas id="GameCanvas" oncontextmenu="event.preventDefault()" tabindex="99"></canvas>
      </div>
    </div>
  

<!-- Polyfills bundle. -->

<script src="src/polyfills.bundle.5adbf.js" charset="utf-8"> </script>


<!-- SystemJS support. -->
<script src="src/system.bundle.543e6.js" charset="utf-8"> </script>

<script src="src/import-map.17abe.json" type="systemjs-importmap" charset="utf-8"> </script>

<script>
    System.import('./index.59ab9.js').catch(function(err) { console.error(err); })
</script>


</body>
</html>
